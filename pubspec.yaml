name: mecano_app
description: "Virtual Mechanic app for Tunisia - manage vehicles, maintenance, and garage bookings."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  hooks_riverpod: ^3.1.0
  flutter_hooks: ^0.21.3+1

  # Routing
  go_router: ^17.1.0

  # Backend
  supabase_flutter: ^2.9.0

  # Local Database
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # Code Generation Annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.17
  smooth_page_indicator: ^2.0.1
  flutter_rating_bar: ^4.0.1
  table_calendar: ^3.2.0
  shimmer: ^3.0.0

  # Maps & Location
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Utilities
  connectivity_plus: ^7.0.0
  uuid: ^4.5.1
  fpdart: ^1.1.0
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  intl: ^0.20.0
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.4.15
  freezed: ^3.2.3
  json_serializable: ^6.9.4
  drift_dev: ^2.25.0

  # Linting
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  very_good_analysis: ^10.1.0

  # Testing
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
